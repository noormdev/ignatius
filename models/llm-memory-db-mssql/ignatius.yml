# Default key style: orm-oriented
# (a suggestion the /noorm-modeling skill reads when authoring new entities;
#  individual entities may differ — it is not enforced. Base entities use surrogate
#  IDENTITY keys (orm-oriented); Task and all subtype/associative tables migrate
#  keys (key-inherited) — reverse-engineered faithfully from the real SQL Server schema.)
name: LLM Memory DB (MSSQL)
version: "1.0"
description: >-
  Reverse-engineered IDEF1X model of the llm-memory-db-mssql schema — an agent
  long-term memory store. Agents record memories, notes, milestones, tasks, and
  artifacts within projects; everything is taggable and every relevance/tracking
  change is journaled as an immutable state transition.
updated: "2026-06-13"
