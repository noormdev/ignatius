name: release-please

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  # Build and attach platform binaries in the SAME workflow run as the release.
  # release-please creates the tag with GITHUB_TOKEN, and a tag pushed by a
  # workflow token does not trigger a separate `on: push: tags` workflow — so a
  # standalone release.yml would silently never run. Gating this job on
  # release_created keeps the build in the push-to-main run that always fires.
  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build React bundle
        run: bun run build:bundle

      - name: Stable names
        run: bun run build:stable-names

      - name: Compile binaries for all platforms
        run: |
          set -e
          mkdir -p dist/release
          declare -A targets=(
            [darwin-arm64]=bun-darwin-arm64
            [darwin-x64]=bun-darwin-x64
            [linux-x64]=bun-linux-x64
            [linux-arm64]=bun-linux-arm64
          )
          for name in "${!targets[@]}"; do
            target="${targets[$name]}"
            echo "Building ignatius-$name..."
            bun build --compile --target="$target" src/cli.ts --outfile "dist/release/ignatius-$name"
          done
          # Windows binary needs .exe suffix
          bun build --compile --target=bun-windows-x64 src/cli.ts --outfile dist/release/ignatius-windows-x64.exe

      - name: Generate checksums
        working-directory: dist/release
        run: |
          shasum -a 256 ignatius-* > checksums.txt
          cat checksums.txt

      - name: Upload binaries to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/release/ignatius-*
            dist/release/checksums.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
